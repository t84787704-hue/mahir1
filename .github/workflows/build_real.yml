name: Build Real Mahir1 APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Create Real App Files + Fix Firebase
        run: |
          set -e
          ROOT="."
          if [ -f "./flutter/pubspec.yaml" ]; then ROOT="./flutter"; fi
          echo "Root: $ROOT"
          cd $ROOT
          rm -rf lib
          mkdir -p lib/models lib/services lib/screens/customer lib/screens/provider android/app
          echo '' | base64 -d > pubspec.yaml
          echo '' | base64 -d > lib/main.dart
          echo '' | base64 -d > lib/models/provider_model.dart
          echo '' | base64 -d > lib/screens/login_screen.dart
          echo '' | base64 -d > lib/screens/role_screen.dart
          echo '' | base64 -d > lib/screens/splash_screen.dart
          echo '' | base64 -d > lib/screens/customer/customer_home_real.dart
          echo '' | base64 -d > lib/screens/provider/provider_dashboard_real.dart
          echo '' | base64 -d > lib/screens/provider/provider_setup_screen.dart
          echo '' | base64 -d > lib/services/auth_service.dart
          echo '' | base64 -d > lib/services/firestore_service.dart
          echo '' | base64 -d > android/app/google-services.json
          echo "=== Patching Android for Firebase ==="
          # Patch android/build.gradle to add google-services classpath
          if [ -f "android/build.gradle" ]; then
            if ! grep -q "google-services" android/build.gradle; then
              sed -i "s/dependencies {/dependencies {\n        classpath 'com.google.gms:google-services:4.4.0'/" android/build.gradle || true
            fi
            cat android/build.gradle
          fi
          # Patch android/app/build.gradle to apply plugin
          if [ -f "android/app/build.gradle" ]; then
            if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
              echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
            fi
            cat android/app/build.gradle | tail -20
          fi
          # Patch android/settings.gradle if needed
          ls -R lib
      - name: Get dependencies
        run: |
          ROOT="."
          if [ -f "./flutter/pubspec.yaml" ]; then ROOT="./flutter"; fi
          cd $ROOT && flutter pub get
      - name: Build APK
        run: |
          ROOT="."
          if [ -f "./flutter/pubspec.yaml" ]; then ROOT="./flutter"; fi
          cd $ROOT && flutter build apk --release --verbose
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mahir1-real-apk
          path: |
            **/build/app/outputs/flutter-apk/app-release.apk
