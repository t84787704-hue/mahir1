name: Build Mahir1 Email FIXED
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Fix Files
        run: |
          cat > lib/main.dart <<'DART'
          import 'package:flutter/material.dart';
          import 'package:firebase_core/firebase_core.dart';
          import 'screens/splash_screen.dart';
          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            try { await Firebase.initializeApp(); } catch(e) { print(e); }
            runApp(const MahirApp());
          }
          class MahirApp extends StatelessWidget {
            const MahirApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(title: 'Mahir1 Worldwide', debugShowCheckedModeBanner: false, home: const SplashScreen());
            }
          }
          DART
          cat > lib/screens/splash_screen.dart <<'DART'
          import 'package:flutter/material.dart';
          import 'package:firebase_auth/firebase_auth.dart';
          import '../services/auth_service.dart';
          import 'login_screen.dart';
          import 'role_screen.dart';
          import 'customer/customer_home_real.dart';
          import 'provider/provider_dashboard_real.dart';
          class SplashScreen extends StatefulWidget { const SplashScreen({super.key}); @override State<SplashScreen> createState() => _SplashScreenState(); }
          class _SplashScreenState extends State<SplashScreen> {
            @override void initState() { super.initState(); _check(); }
            Future<void> _check() async {
              await Future.delayed(const Duration(milliseconds: 1500));
              try {
                final user = FirebaseAuth.instance.currentUser;
                if (user == null) { if (!mounted) return; Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const LoginScreen())); return; }
                final role = await AuthService().getUserRole(user.uid);
                if (!mounted) return;
                if (role == null) { Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => RoleScreen(user: user))); }
                else if (role == 'provider') { Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => ProviderDashboardReal(user: user))); }
                else { Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => CustomerHomeReal(user: user))); }
              } catch(e) {
                if (!mounted) return;
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const LoginScreen()));
              }
            }
            @override Widget build(BuildContext context) {
              return Scaffold(backgroundColor: Colors.blue, body: Center(child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [Icon(Icons.handyman, size: 80, color: Colors.white), SizedBox(height: 20), Text('Mahir1 Worldwide', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold, color: Colors.white)), SizedBox(height: 20), CircularProgressIndicator(color: Colors.white)])));
            }
          }
          DART
          echo "" | base64 -d > android/app/google-services.json
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mahir1-email-fixed-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
