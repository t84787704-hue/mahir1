import 'package:flutter/material.dart';
import '../services/auth_service.dart';
import 'role_screen.dart';

class LoginScreen extends StatefulWidget {
  const LoginScreen({super.key});
  @override
  State<LoginScreen> createState() => _LoginScreenState();
}

class _LoginScreenState extends State<LoginScreen> {
  bool loading = false;
  bool isSignup = false;
  final emailCtrl = TextEditingController();
  final passCtrl = TextEditingController();

  Future<void> _submit() async {
    final email = emailCtrl.text.trim();
    final pass = passCtrl.text.trim();
    if (email.isEmpty || pass.isEmpty) {
      ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Email aur Password likho')));
      return;
    }
    setState(() => loading = true);
    try {
      final auth = AuthService();
      User? user;
      if (isSignup) {
        user = await auth.signUpWithEmail(email, pass);
      } else {
        user = await auth.signInWithEmail(email, pass);
      }
      if (user != null && mounted) {
        Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => RoleScreen(user: user!)));
      }
    } catch (e) {
      if (mounted) {
        ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('Error: $e')));
      }
    } finally {
      if (mounted) setState(() => loading = false);
    }
  }

  Future<void> _forgot() async {
    final email = emailCtrl.text.trim();
    if (email.isEmpty) {
      ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Pehele Email likho, phir Forgot dabao')));
      return;
    }
    try {
      await AuthService().sendPasswordReset(email);
      if (mounted) {
        ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('Reset link bhej diya $email pe!')));
      }
    } catch (e) {
      if (mounted) {
        ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('Error: $e')));
      }
    }
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      body: Center(
        child: SingleChildScrollView(
          padding: const EdgeInsets.all(24),
          child: Column(
            mainAxisAlignment: MainAxisAlignment.center,
            children: [
              const Icon(Icons.handyman, size: 80, color: Colors.blue),
              const SizedBox(height: 16),
              const Text('Mahir1 Worldwide', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold)),
              const Text('Find Best Mahir Anywhere', style: TextStyle(color: Colors.grey)),
              const SizedBox(height: 30),
              TextField(controller: emailCtrl, decoration: const InputDecoration(labelText: 'Email', border: OutlineInputBorder(), prefixIcon: Icon(Icons.email)), keyboardType: TextInputType.emailAddress),
              const SizedBox(height: 12),
              TextField(controller: passCtrl, decoration: const InputDecoration(labelText: 'Password', border: OutlineInputBorder(), prefixIcon: Icon(Icons.lock)), obscureText: true),
              const SizedBox(height: 8),
              Align(alignment: Alignment.centerRight, child: TextButton(onPressed: _forgot, child: const Text('Forgot Password?'))),
              const SizedBox(height: 12),
              loading
                  ? const CircularProgressIndicator()
                  : Column(
                      children: [
                        ElevatedButton(
                          onPressed: _submit,
                          style: ElevatedButton.styleFrom(minimumSize: const Size(double.infinity, 50)),
                          child: Text(isSignup ? 'Sign Up' : 'Login'),
                        ),
                        const SizedBox(height: 12),
                        TextButton(
                          onPressed: () => setState(() => isSignup = !isSignup),
                          child: Text(isSignup ? 'Already have account? Login' : 'New user? Create Account'),
                        ),
                      ],
                    ),
            ],
          ),
        ),
      ),
    );
  }
}
