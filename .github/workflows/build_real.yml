name: Build Real Mahir1 APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
      - name: Create Real App Files
        run: |
          echo "Finding flutter root..."
          ROOT="."
          if [ -f "./flutter/pubspec.yaml" ]; then ROOT="./flutter"; elif [ -f "./app/pubspec.yaml" ]; then ROOT="./app"; fi
          echo "Root: $ROOT"
          cd $ROOT
          rm -rf lib
          mkdir -p lib/models lib/services lib/screens/customer lib/screens/provider android/app
          cat > pubspec.yaml <<'ENDOFFILE'
          name: mahir1
          description: Mahir1 - Worldwide Real Services App
          publish_to: 'none'
          version: 1.0.0+1
          
          environment:
            sdk: ">=3.0.0 <4.0.0"
          
          dependencies:
            flutter:
              sdk: flutter
            firebase_core: ^2.24.2
            firebase_auth: ^4.15.3
            cloud_firestore: ^4.15.8
            google_sign_in: ^6.1.6
            cupertino_icons: ^1.0.6
          
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          
          flutter:
            uses-material-design: true
          ENDOFFILE
          cat > lib/main.dart <<'ENDOFFILE'
          
          import 'package:flutter/material.dart';
          import 'package:firebase_core/firebase_core.dart';
          import 'screens/splash_screen.dart';
          
          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await Firebase.initializeApp();
            runApp(const MahirApp());
          }
          
          class MahirApp extends StatelessWidget {
            const MahirApp({super.key});
          
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Mahir1 Worldwide',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
                  useMaterial3: true,
                ),
                home: const SplashScreen(),
              );
            }
          }
          ENDOFFILE
          cat > lib/models/provider_model.dart <<'ENDOFFILE'
          
          import 'package:cloud_firestore/cloud_firestore.dart';
          
          class ProviderModel {
            final String uid;
            final String name;
            final String email;
            final String category; // Plumber, Electrician, Painter etc
            final String city;
            final String country;
            final int pricePerHour;
            final double rating;
            final bool isOnline;
            final String bio;
            final Timestamp createdAt;
          
            ProviderModel({
              required this.uid,
              required this.name,
              required this.email,
              required this.category,
              required this.city,
              required this.country,
              required this.pricePerHour,
              this.rating = 5.0,
              this.isOnline = true,
              this.bio = '',
              required this.createdAt,
            });
          
            factory ProviderModel.fromDoc(DocumentSnapshot doc) {
              final data = doc.data() as Map<String, dynamic>;
              return ProviderModel(
                uid: data['uid'] ?? doc.id,
                name: data['name'] ?? '',
                email: data['email'] ?? '',
                category: data['category'] ?? 'Other',
                city: data['city'] ?? '',
                country: data['country'] ?? '',
                pricePerHour: (data['pricePerHour'] ?? 0).toInt(),
                rating: (data['rating'] ?? 5.0).toDouble(),
                isOnline: data['isOnline'] ?? true,
                bio: data['bio'] ?? '',
                createdAt: data['createdAt'] ?? Timestamp.now(),
              );
            }
          
            Map<String, dynamic> toMap() {
              return {
                'uid': uid,
                'name': name,
                'email': email,
                'category': category,
                'city': city,
                'country': country,
                'pricePerHour': pricePerHour,
                'rating': rating,
                'isOnline': isOnline,
                'bio': bio,
                'createdAt': createdAt,
              };
            }
          }
          ENDOFFILE
          cat > lib/screens/login_screen.dart <<'ENDOFFILE'
          
          import 'package:flutter/material.dart';
          import '../services/auth_service.dart';
          import 'role_screen.dart';
          
          class LoginScreen extends StatefulWidget {
            const LoginScreen({super.key});
            @override
            State<LoginScreen> createState() => _LoginScreenState();
          }
          
          class _LoginScreenState extends State<LoginScreen> {
            bool loading = false;
          
            Future<void> _login() async {
              setState(() => loading = true);
              try {
                final user = await AuthService().signInWithGoogle();
                if (user != null && mounted) {
                  Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => RoleScreen(user: user)));
                }
              } catch (e) {
                if (mounted) {
                  ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('Login failed: \$e')));
                }
              } finally {
                if (mounted) setState(() => loading = false);
              }
            }
          
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Center(
                  child: Padding(
                    padding: const EdgeInsets.all(24),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        const Icon(Icons.handyman, size: 80, color: Colors.blue),
                        const SizedBox(height: 16),
                        const Text('Mahir1 Worldwide', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold)),
                        const Text('Find Best Mahir Anywhere', style: TextStyle(color: Colors.grey)),
                        const SizedBox(height: 40),
                        loading
                            ? const CircularProgressIndicator()
                            : ElevatedButton.icon(
                                onPressed: _login,
                                icon: const Icon(Icons.login),
                                label: const Text('Continue with Google'),
                                style: ElevatedButton.styleFrom(minimumSize: const Size(double.infinity, 50)),
                              ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          ENDOFFILE
          cat > lib/screens/role_screen.dart <<'ENDOFFILE'
          
          import 'package:flutter/material.dart';
          import 'package:firebase_auth/firebase_auth.dart';
          import '../services/auth_service.dart';
          import 'customer/customer_home_real.dart';
          import 'provider/provider_setup_screen.dart';
          
          class RoleScreen extends StatelessWidget {
            final User user;
            const RoleScreen({super.key, required this.user});
          
            Future<void> _selectRole(BuildContext context, String role) async {
              await AuthService().saveUserRole(user.uid, user.email ?? '', user.displayName ?? 'User', role);
              if (!context.mounted) return;
              if (role == 'provider') {
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => ProviderSetupScreen(user: user)));
              } else {
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => CustomerHomeReal(user: user)));
              }
            }
          
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text('Welcome, \${user.displayName}')),
                body: Padding(
                  padding: const EdgeInsets.all(24),
                  child: Column(
                    children: [
                      const Text('I want to...', style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                      const SizedBox(height: 24),
                      Card(
                        child: ListTile(
                          leading: const Icon(Icons.person, size: 40),
                          title: const Text('Hire a Mahir (Customer)'),
                          subtitle: const Text('Need service worldwide'),
                          onTap: () => _selectRole(context, 'customer'),
                        ),
                      ),
                      const SizedBox(height: 16),
                      Card(
                        child: ListTile(
                          leading: const Icon(Icons.build, size: 40, color: Colors.blue),
                          title: const Text('I am a Mahir (Provider)'),
                          subtitle: const Text('Provide services & earn'),
                          onTap: () => _selectRole(context, 'provider'),
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          ENDOFFILE
          cat > lib/screens/splash_screen.dart <<'ENDOFFILE'
          
          import 'package:flutter/material.dart';
          import 'package:firebase_auth/firebase_auth.dart';
          import '../services/auth_service.dart';
          import 'login_screen.dart';
          import 'role_screen.dart';
          import 'customer/customer_home_real.dart';
          import 'provider/provider_dashboard_real.dart';
          
          class SplashScreen extends StatefulWidget {
            const SplashScreen({super.key});
            @override
            State<SplashScreen> createState() => _SplashScreenState();
          }
          
          class _SplashScreenState extends State<SplashScreen> {
            @override
            void initState() {
              super.initState();
              _check();
            }
          
            Future<void> _check() async {
              await Future.delayed(const Duration(seconds: 1));
              final user = FirebaseAuth.instance.currentUser;
              if (user == null) {
                if (!mounted) return;
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const LoginScreen()));
                return;
              }
              final role = await AuthService().getUserRole(user.uid);
              if (!mounted) return;
              if (role == null) {
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => RoleScreen(user: user)));
              } else if (role == 'provider') {
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => ProviderDashboardReal(user: user)));
              } else {
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => CustomerHomeReal(user: user)));
              }
            }
          
            @override
            Widget build(BuildContext context) {
              return const Scaffold(
                body: Center(child: CircularProgressIndicator()),
              );
            }
          }
          ENDOFFILE
          cat > lib/screens/customer/customer_home_real.dart <<'ENDOFFILE'
          
          import 'package:flutter/material.dart';
          import 'package:firebase_auth/firebase_auth.dart';
          import '../../services/firestore_service.dart';
          import '../../models/provider_model.dart';
          import '../../services/auth_service.dart';
          import '../login_screen.dart';
          
          class CustomerHomeReal extends StatefulWidget {
            final User user;
            const CustomerHomeReal({super.key, required this.user});
            @override
            State<CustomerHomeReal> createState() => _CustomerHomeRealState();
          }
          
          class _CustomerHomeRealState extends State<CustomerHomeReal> {
            final _service = FirestoreService();
            String searchCity = '';
            String selectedCategory = 'All';
          
            final categories = ['All', 'Plumber', 'Electrician', 'Painter', 'Carpenter', 'AC Repair', 'Cleaner'];
          
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Find Best Mahir'),
                  actions: [
                    IconButton(onPressed: () async {
                      await AuthService().signOut();
                      if (context.mounted) Navigator.pushAndRemoveUntil(context, MaterialPageRoute(builder: (_) => const LoginScreen()), (r) => false);
                    }, icon: const Icon(Icons.logout))
                  ],
                ),
                body: Column(
                  children: [
                    Padding(
                      padding: const EdgeInsets.all(12),
                      child: Column(
                        children: [
                          TextField(
                            decoration: const InputDecoration(prefixIcon: Icon(Icons.search), hintText: 'Search by city (e.g. Riyadh, Lahore, Dubai)', border: OutlineInputBorder()),
                            onChanged: (v) => setState(() => searchCity = v.trim()),
                          ),
                          const SizedBox(height: 8),
                          SizedBox(
                            height: 40,
                            child: ListView(
                              scrollDirection: Axis.horizontal,
                              children: categories.map((c) => Padding(
                                padding: const EdgeInsets.only(right: 8),
                                child: ChoiceChip(
                                  label: Text(c),
                                  selected: selectedCategory == c,
                                  onSelected: (_) => setState(() => selectedCategory = c),
                                ),
                              )).toList(),
                            ),
                          )
                        ],
                      ),
                    ),
                    Expanded(
                      child: StreamBuilder<List<ProviderModel>>(
                        stream: _service.streamProviders(
                          city: searchCity.isEmpty ? null : searchCity,
                          category: selectedCategory == 'All' ? null : selectedCategory,
                        ),
                        builder: (context, snap) {
                          if (snap.connectionState == ConnectionState.waiting) return const Center(child: CircularProgressIndicator());
                          if (!snap.hasData || snap.data!.isEmpty) {
                            return const Center(child: Text('No Mahirs found worldwide.\nTry different city or become first provider!'));
                          }
                          final list = snap.data!;
                          return ListView.builder(
                            itemCount: list.length,
                            itemBuilder: (_, i) {
                              final p = list[i];
                              return Card(
                                margin: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                                child: ListTile(
                                  leading: CircleAvatar(child: Text(p.name.isNotEmpty ? p.name[0] : 'M')),
                                  title: Text('\${p.name} - \${p.category}'),
                                  subtitle: Text('\${p.city}, \${p.country} • ⭐ \${p.rating}'),
                                  trailing: Text('Rs \${p.pricePerHour}/hr', style: const TextStyle(color: Colors.blue, fontWeight: FontWeight.bold)),
                                  onTap: () async {
                                    final confirm = await showDialog<bool>(context: context, builder: (_) => AlertDialog(
                                      title: Text('Book \${p.name}?'),
                                      content: Text('Service: \${p.category} in \${p.city}'),
                                      actions: [TextButton(onPressed: () => Navigator.pop(context, false), child: const Text('Cancel')), ElevatedButton(onPressed: () => Navigator.pop(context, true), child: const Text('Book Now'))],
                                    ));
                                    if (confirm == true) {
                                      await _service.createBooking(customerId: widget.user.uid, providerId: p.uid, service: p.category);
                                      if (context.mounted) ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Booking sent! Real booking saved in Firebase.')));
                                    }
                                  },
                                ),
                              );
                            },
                          );
                        },
                      ),
                    )
                  ],
                ),
                bottomNavigationBar: BottomNavigationBar(
                  currentIndex: 0,
                  items: const [
                    BottomNavigationBarItem(icon: Icon(Icons.home), label: 'Home'),
                    BottomNavigationBarItem(icon: Icon(Icons.search), label: 'Search'),
                    BottomNavigationBarItem(icon: Icon(Icons.chat), label: 'Chat'),
                    BottomNavigationBarItem(icon: Icon(Icons.person), label: 'Profile'),
                  ],
                ),
              );
            }
          }
          ENDOFFILE
          cat > lib/screens/provider/provider_dashboard_real.dart <<'ENDOFFILE'
          
          import 'package:flutter/material.dart';
          import 'package:firebase_auth/firebase_auth.dart';
          import 'package:cloud_firestore/cloud_firestore.dart';
          import '../../services/firestore_service.dart';
          import '../../services/auth_service.dart';
          import '../login_screen.dart';
          
          class ProviderDashboardReal extends StatefulWidget {
