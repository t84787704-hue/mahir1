              });
            }
          
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Provider Dashboard - Worldwide'),
                  actions: [IconButton(onPressed: () async { await AuthService().signOut(); 
