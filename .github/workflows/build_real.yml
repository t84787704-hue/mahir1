import 'package:flutter/material.dart';
import 'package:firebase_auth/firebase_auth.dart';
import 'package:cloud_firestore/cloud_firestore.dart';
import '../../services/firestore_service.dart';
import '../../services/auth_service.dart';
import '../login_screen.dart';

class ProviderDashboardReal extends StatefulWidget {
  final User user;
  const ProviderDashboardReal({super.key, required this.user});
  @override
  State<ProviderDashboardReal> createState() => _ProviderDashboardRealState();
}

class _ProviderDashboardRealState extends State<ProviderDashboardReal> {
  bool isOnline = true;

  @override
  void initState() {
    super.initState();
    FirebaseFirestore.instance.collection('providers').doc(widget.user.uid).get().then((doc) {
      if (doc.exists) setState(() => isOnline = doc.data()?['isOnline'] ?? true);
    });
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        title: const Text('Provider Dashboard - Worldwide'),
        actions: [IconButton(onPressed: () async { await AuthService().signOut(); if(context.mounted) Navigator.pushAndRemoveUntil(context, MaterialPageRoute(builder: (_) => const LoginScreen()), (r) => false); }, icon: const Icon(Icons.logout))],
      ),
      body: Column(
        children: [
          SwitchListTile(
            title: Text(isOnline ? 'You are ONLINE Worldwide' : 'You are OFFLINE'),
            subtitle: Text(isOnline ? 'Customers can find you' : 'Go online to get bookings'),
            value: isOnline,
            onChanged: (v) async {
              setState(() => isOnline = v);
              await FirestoreService().toggleOnline(widget.user.uid, v);
            },
          ),
          const Divider(),
          const Padding(padding: EdgeInsets.all(12), child: Text('Real Bookings from Firebase:', style: TextStyle(fontWeight: FontWeight.bold))),
          Expanded(
            child: StreamBuilder<QuerySnapshot>(
              stream: FirebaseFirestore.instance.collection('bookings').where('providerId', isEqualTo: widget.user.uid).orderBy('createdAt', descending: true).snapshots(),
              builder: (context, snap) {
                if (!snap.hasData) return const Center(child: CircularProgressIndicator());
                if (snap.data!.docs.isEmpty) return const Center(child: Text('No bookings yet. Share your profile worldwide!'));
                return ListView(
                  children: snap.data!.docs.map((doc) {
                    final data = doc.data() as Map<String, dynamic>;
                    return Card(
                      margin: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                      child: ListTile(
                        title: Text("Service: ${data['service']}"),
                        subtitle: Text("Customer: ${data['customerId']}\nStatus: ${data['status']}"),
                        trailing: ElevatedButton(onPressed: () => FirebaseFirestore.instance.collection('bookings').doc(doc.id).update({'status': 'accepted'}), child: const Text('Accept')),
                      ),
                    );
                  }).toList(),
                );
              },
            ),
          )
        ],
      ),
    );
  }
}
